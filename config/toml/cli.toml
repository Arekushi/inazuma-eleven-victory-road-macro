[CLI.TUFUP]
has_update = ':arrows_counterclockwise: An update is available: [white on blue b] Version $version [/]'
please_confirm = ':pleading_face: To continue, please [b]type y[/] to confirm and then run the CLI again.'

[CLI.MATCH]
rule = ':new_moon: [b]Executing macro...[/]'
failed = ':x: Macro execution [white on red] failed... [/]'

[CLI.PIPELINE]
start = ':white_check_mark: Pipeline started'
end = ':thumbsup: Pipeline ended'
timeout = '[b]$loop_count/$max_loops[/] :alarm_clock: Timeout: [b]$step_name[/]'
step_enter = '[b]$loop_count/$max_loops[/] :point_right: Entering the step: [b]$step_name[/]'
